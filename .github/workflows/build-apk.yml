name: Build Android APK

# Builds a signed release APK on every push to main and publishes it to the
# "latest" GitHub Release, so the app can be installed/updated straight from the
# repo's Releases page.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Strip any CR/whitespace (Windows-set secrets can carry a trailing \r).
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n ' | base64 -d > android/app/upload-keystore.jks
          ls -l android/app/upload-keystore.jks
          KS_PW=$(printf '%s' "$KEYSTORE_PASSWORD" | tr -d '\r\n')
          KA=$(printf '%s' "$KEY_ALIAS" | tr -d '\r\n')
          KP=$(printf '%s' "$KEY_PASSWORD" | tr -d '\r\n')
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KS_PW
          keyAlias=$KA
          keyPassword=$KP
          EOF

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "1.4"
          body: |
            Chatori Finance **1.4** — Reports (charts) and Paytm screenshot reader (on-device OCR).
            Download **app-release.apk** below and install it on your phone.
          files: build/app/outputs/flutter-apk/app-release.apk
